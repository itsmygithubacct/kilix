# kilix — kitty made to look & behave like Tilix
# Loaded by ../kilix, which runs the forked kitty in ../src (kitty.app is the fallback; >= 0.47).
# Requires kitty >= 0.47 for per-pane title bars (window_title_bar).

#: ── Tilix-style per-pane title bars ─────────────────────────────
# Each pane gets a header bar (like Tilix) with clickable split / maximize /
# close buttons (the fork's feature); the keymaps below are the keyboard equivalents.
window_title_bar               top
window_title_bar_min_windows   1
window_title_template          " {bell_symbol}{activity_symbol}{title} "
active_window_title_template    " ▎{bell_symbol}{activity_symbol}{title} "
window_title_bar_align         left
# Tilix-style active-pane cue: bright active header, grayed inactive header
window_title_bar_active_background     #3465a4
window_title_bar_active_foreground     #ffffff
window_title_bar_inactive_background   #2e3436
window_title_bar_inactive_foreground   #8a8a8a
# kilix fork: pin the pane-button Nerd Font glyphs to the bundled font.
# F0731 ← split-left, F0737 ↑ split-up, F072E ↓ split-down, F0734 → split-right,
# EAB9 □ maximize (tiled) / F0293 ⛶ maximize (state cue), F0156 ✕ close.
symbol_map U+EAB9,U+F0156,U+F0293,U+F072E,U+F0731,U+F0734,U+F0737 Symbols Nerd Font Mono

#: ── Tiling like Tilix ───────────────────────────────────────────
# splits first => it's the default layout, so vsplit/hsplit work.
# stack acts as a "zoom/maximize this pane" toggle.
enabled_layouts                splits,stack,tall,grid

#: ── Pane borders / active-pane emphasis (Tilix dims inactive) ───
window_border_width            1pt
draw_minimal_borders           yes
active_border_color            #729fcf
inactive_border_color          #45484b
inactive_text_alpha            0.7
window_margin_width            0
window_padding_width           4
single_window_margin_width     0

#: ── Pages (Tilix "sessions") — tab strip across the top ─────────
# Always show the page strip, with a clickable [+] to add a page.
tab_bar_edge                   top
tab_bar_style                  powerline
tab_powerline_style            slanted
tab_bar_min_tabs               1
tab_bar_show_new_tab_button    yes
tab_title_template             "{index}: {title}"

#: ── Tango palette (GNOME Terminal / Tilix default colors) ───────
background                     #1d1f21
foreground                     #d3d7cf
cursor                         #729fcf
selection_background           #3465a4
selection_foreground           #ffffff
# normal
color0  #2e3436
color1  #cc0000
color2  #4e9a06
color3  #c4a000
color4  #3465a4
color5  #75507b
color6  #06989a
color7  #d3d7cf
# bright
color8  #555753
color9  #ef2929
color10 #8ae234
color11 #fce94f
color12 #729fcf
color13 #ad7fa8
color14 #34e2e2
color15 #eeeeec

#: ── Misc feel ───────────────────────────────────────────────────
cursor_shape                   block
scrollback_lines               10000
enable_audio_bell              no
confirm_os_window_close        -1

#: ── Mouse (kilix fork) ─────────────────────────────────────────
# Right-click opens a clickable context menu (Copy / Paste / Select all /
# Clear selection). Both mouse-click and single-letter keys work. Remove this
# line to restore the default right-drag "extend selection" behavior.
mouse_map right press ungrabbed show_context_menu

# In-terminal software mouse cursor: an inverse-video block on the cell under
# the pointer, drawn by kilix itself (the OS pointer is hidden over the grid).
# `block` (default) = gpm-style inverse cell, `pointer` = I-beam glyph,
# `none` = use the OS/compositor pointer. Especially useful under the plebian
# cage console where a themed OS pointer may be unavailable.
software_mouse_cursor          block

#: ── Remote control (needed for hosting graphical apps in overlays) ──
# `kilix browse` / `kilix run` open the app in its own overlay window (with a
# clickable close button) via `kitten @ launch --type=overlay`, which needs
# remote control. `yes` allows control both over the per-instance socket
# (used by kitten @ from inside a window) and via TTY escape codes — the most
# convenient, at the cost of a larger attack surface (any program in a pane
# can drive kitty). Remove both lines to disable remote control; browse/run
# then run in-place in the current pane instead of an overlay window.
allow_remote_control           yes
listen_on                      unix:@kilix-{kitty_pid}

#: ═══════════════════════════════════════════════════════════════
#: Keybindings — Tilix layout, mapped to kitty actions
#: ═══════════════════════════════════════════════════════════════

# Add panes (Tilix: Ctrl+Alt+R = right/side-by-side, Ctrl+Alt+D = down/stacked)
map ctrl+alt+r   launch --location=vsplit --cwd=current
map ctrl+alt+d   launch --location=hsplit --cwd=current
# generic split honoring the larger dimension
map ctrl+shift+enter launch --location=split --cwd=current

# Close the active pane (Tilix: Ctrl+Alt+W)
map ctrl+alt+w   close_window

# Focus panes by direction (Tilix: Alt+Arrows)
map alt+left     neighboring_window left
map alt+right    neighboring_window right
map alt+up       neighboring_window up
map alt+down     neighboring_window down

# Resize the active pane (Ctrl+Shift+Arrows)
map ctrl+shift+left    resize_window narrower
map ctrl+shift+right   resize_window wider
map ctrl+shift+up      resize_window taller
map ctrl+shift+down    resize_window shorter
map ctrl+shift+home    resize_window reset

# Move/swap the active pane within the layout
map ctrl+alt+left      move_window left
map ctrl+alt+right     move_window right
map ctrl+alt+up        move_window up
map ctrl+alt+down      move_window down

# Zoom/maximize the active pane (toggle the stack layout)
map ctrl+alt+z   toggle_layout stack

# Broadcast input to every pane of the current page (Tilix "synchronize input").
# Opens an overlay you type into; keystrokes mirror to the page's panes. Ctrl+Esc exits.
map ctrl+alt+b   launch --type=overlay --allow-remote-control --window-title BROADCAST kitty +kitten broadcast --match-tab state:focused

# Pages — Tilix "sessions", one page of panes per kitty tab.
# Tilix defaults: Ctrl+Shift+T new, Ctrl+Shift+Q close, Ctrl+PgUp/PgDn
# switch, Ctrl+Shift+PgUp/PgDn reorder, Ctrl+Alt+1..0 jump to page N,
# F12 session sidebar (here: kitty's visual tab chooser).
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_tab
map ctrl+page_up   previous_tab
map ctrl+page_down next_tab
map ctrl+shift+page_up   move_tab_backward
map ctrl+shift+page_down move_tab_forward
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9
map ctrl+alt+0 goto_tab 10
map f12 select_tab
map f2  set_tab_title
map f11 toggle_fullscreen

# Next/previous pane within a page (Tilix: Ctrl+Tab / Ctrl+Shift+Tab)
map ctrl+tab       next_window
map ctrl+shift+tab previous_window

# New OS window (Tilix: Ctrl+Shift+N)
map ctrl+shift+n new_os_window_with_cwd

# Cycle split orientation / layouts
map ctrl+alt+l   next_layout
