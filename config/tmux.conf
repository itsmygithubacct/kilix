# kilix — private tmux config for `kilix serve` / `attach` / `view`.
#
# Loaded ONLY by kilix's own tmux server (a socket under the kilix runtime dir);
# it never touches your ~/.tmux.conf or a normal tmux. Its job is to give a kilix
# session three things kitty lacks natively: persistence across disconnects,
# multi-device attach, and server-enforced read-only viewers — while letting the
# kitty graphics protocol pass through to attached terminals.

# Let graphics-protocol APCs through untouched. kilix's gfx.blit_direct and
# `kitten icat --unicode-placeholder` wrap each image in the tmux DCS passthrough
# envelope; without this, tmux strips them.
set -g allow-passthrough on

# Truecolor to attached kitty/kilix terminals.
set -as terminal-features ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-kitty:Tc"

# One authoritative geometry. Graphics placements are pinned to cells, so
# resizing per-client would misplace them: size to the smallest attached client
# and don't reflow to whichever client is active.
set -g window-size smallest
setw -g aggressive-resize off

set -g mouse on
set -g focus-events on
set -sg escape-time 10
set -g history-limit 10000
set -g status-style "bg=#2e3436,fg=#d3d7cf"
set -g status-left "#[bold] kilix:#S  "
set -g status-right "#[dim]%H:%M "
